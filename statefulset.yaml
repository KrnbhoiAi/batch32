apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: my-ss

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: mysql-container
        image: mysql:8.0

        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root123

        - name: MYSQL_USER
          value: admin

        - name: MYSQL_PASSWORD
          value: admin123

        - name: MYSQL_DATABASE
          value: mydb