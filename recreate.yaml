apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-deployment
  labels:
    app: myapp

spec:
  replicas: 5

  selector:
    matchLabels:
      app: myapp

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        ports:
        - containerPort: 80